name: Generate Readmes

on:
  push:
    paths:
      - "content/**"
      - "scripts/generate_readmes.py"
      - ".github/workflows/generate-readmes.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    env:
      README_TRANSLATOR_PROVIDER: ${{ vars.README_TRANSLATOR_PROVIDER }}
      README_TRANSLATOR_AZURE_API_KEY: ${{ secrets.README_TRANSLATOR_AZURE_API_KEY }}
      README_TRANSLATOR_AZURE_ENDPOINT: ${{ vars.README_TRANSLATOR_AZURE_ENDPOINT }}
      README_TRANSLATOR_AZURE_REGION: ${{ vars.README_TRANSLATOR_AZURE_REGION }}
      README_TRANSLATOR_OPENAI_API_KEY: ${{ secrets.README_TRANSLATOR_OPENAI_API_KEY }}
      README_TRANSLATOR_OPENAI_BASE_URL: ${{ vars.README_TRANSLATOR_OPENAI_BASE_URL }}
      README_TRANSLATOR_OPENAI_MODEL: ${{ vars.README_TRANSLATOR_OPENAI_MODEL }}
      README_TRANSLATOR_DEEPL_API_KEY: ${{ secrets.README_TRANSLATOR_DEEPL_API_KEY }}
      README_TRANSLATOR_DEEPL_API_URL: ${{ vars.README_TRANSLATOR_DEEPL_API_URL }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Validate generator
        run: python3 -m py_compile scripts/generate_readmes.py

      - name: Generate multilingual readmes
        run: python3 scripts/generate_readmes.py

      - name: Commit generated readmes
        shell: bash
        run: |
          if git diff --quiet -- README.md README.zh-CN.md; then
            echo "No README updates were generated."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md README.zh-CN.md
          git commit -m "docs: regenerate multilingual readmes"
          git push
